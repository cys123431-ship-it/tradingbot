name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 Azure 서버에 접속해서 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            cd /home/azureuser
            
            echo "=== Git Pull 시작 ==="
            git pull origin main
            
            echo "=== 기존 봇 프로세스 종료 ==="
            pkill -f emas.py || true
            
            echo "=== 봇 재시작 ==="
            nohup python3 emas.py > emas.log 2>&1 &
            
            echo "=== 배포 완료 ==="
            ps aux | grep emas.py