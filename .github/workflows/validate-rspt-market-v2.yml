name: Validate RSPT closed-candle execution hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: validate-rspt-closed-candle-execution-hardening
  cancel-in-progress: false

jobs:
  validate-and-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: rspt-closed-candle-market-entry
          fetch-depth: 0

      - name: Apply latest-base reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          echo "a5e45b3d107472e5149e73fa3dc5fc7d1777ed71042426e192db55afbf6c6dd2  .github/patches/rspt-market-v2.patch" | sha256sum -c -
          git apply --check --verbose .github/patches/rspt-market-v2.patch
          git apply --verbose .github/patches/rspt-market-v2.patch
          git diff --check

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile changed Python files
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            emas.py \
            utbreakout/relative_strength_pullback.py \
            tests/test_relative_strength_pullback.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_utbreakout_helpers.py \
            tests/test_rspt_closed_candle_market_entry.py

      - name: Run targeted RSPT and market-order tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_relative_strength_pullback.py \
            tests/test_rspt_closed_candle_market_entry.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_utbreakout_helpers.py \
            tests/test_trading_safety_order_gateway.py

      - name: Run full test suite
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q

      - name: Commit verified production changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            emas.py \
            utbreakout/relative_strength_pullback.py \
            tests/test_relative_strength_pullback.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_utbreakout_helpers.py
          git diff --cached --check
          git commit -m "fix: align RSPT market entry to confirmed closed candle"
          git push origin HEAD:rspt-closed-candle-market-entry
