name: Apply validated QH Flow implementation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-qh-flow-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/qh-flow.patch.gz.b64.part* > /tmp/qh-flow.patch.gz.b64
          echo '11e57e34a409333809616f09c3798f8b775dea2133a2b006dc399dcef78cc09b  /tmp/qh-flow.patch.gz.b64' | sha256sum -c -
          base64 --decode /tmp/qh-flow.patch.gz.b64 > /tmp/qh-flow.patch.gz
          echo 'a9431950edca4f731b323cac45312eceeefdef71a47ab6f91a58861fd065d573  /tmp/qh-flow.patch.gz' | sha256sum -c -
          gzip --decompress --stdout /tmp/qh-flow.patch.gz > /tmp/qh-flow.patch
          echo '5ffe44eb9985456bc3915440e3a2d35072630a5393a406eea3a65becdbadc9e5  /tmp/qh-flow.patch' | sha256sum -c -
          git apply --check /tmp/qh-flow.patch
          git apply /tmp/qh-flow.patch
          git diff --check

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile emas.py utbreakout/qh_flow.py scripts/launch_emas.py
          python -m pytest -q

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agent
          rm -f .github/workflows/apply-qh-flow.yml
          git add -A
          git diff --cached --check
          git config user.name 'openai-agent[bot]'
          git config user.email 'openai-agent[bot]@users.noreply.github.com'
          git commit -m 'feat: add live QH Flow L2 gate and triple strategy'
          git push origin HEAD
