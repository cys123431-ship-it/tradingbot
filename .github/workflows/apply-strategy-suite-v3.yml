name: Apply strategy suite v3

on:
  pull_request:
    branches:
      - main
    paths:
      - .agent/apply_strategy_suite_v3.part00
      - .agent/apply_strategy_suite_v3_part*.py
      - .github/workflows/apply-strategy-suite-v3.yml
      - utbreakout/crowding_unwind.py
      - utbreakout/rspt_v3.py
      - utbreakout/strategy_allocator.py
      - tests/test_strategy_suite_v3.py

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/strategy-suite-v3'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/strategy-suite-v3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Validate patch modules
        run: python -m py_compile .agent/apply_strategy_suite_v3_part*.py

      - name: Reconstruct validated patch
        run: |
          cp .agent/apply_strategy_suite_v3.part00 /tmp/apply_strategy_suite_v3.py
          python -c "from pathlib import Path; import runpy; target=Path('/tmp/apply_strategy_suite_v3.py'); content=target.read_text(encoding='utf-8') + ''.join(runpy.run_path(f'.agent/apply_strategy_suite_v3_part{i:02d}.py')['PART'] for i in range(1,7)); target.write_text(content, encoding='utf-8')"
          python -m py_compile /tmp/apply_strategy_suite_v3.py

      - name: Apply runtime integration
        run: |
          python /tmp/apply_strategy_suite_v3.py
          python - <<'PY'
          from pathlib import Path

          path = Path('emas.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("QH_FLOW_STRATEGY: 'QH_FLOW_V2',", "QH_FLOW_STRATEGY: 'QH_FLOW',", 1)
          path.write_text(text, encoding='utf-8')

          old_source = 'RSPT-v2 residual strength'
          new_source = 'RSPT-v3 BTC/ETH/alt/vol residual strength'
          for test_path in Path('tests').glob('test_*.py'):
              test_text = test_path.read_text(encoding='utf-8')
              if old_source in test_text:
                  test_path.write_text(test_text.replace(old_source, new_source), encoding='utf-8')

          test_path = Path('tests/test_relative_strength_pullback.py')
          test_text = test_path.read_text(encoding='utf-8')
          test_text = test_text.replace(
              'assert cfg["rspt_v2_enabled"] is True\n',
              'assert cfg["rspt_v2_enabled"] is True\n    assert cfg["rspt_v3_enabled"] is True\n    assert cfg["alt_common_factor_enabled"] is True\n    assert cfg["market_volatility_factor_enabled"] is True\n',
              1,
          )
          test_path.write_text(test_text, encoding='utf-8')
          PY

      - name: Compile changed runtime
        run: |
          python -m py_compile \
            emas.py \
            utbreakout/qh_flow.py \
            utbreakout/crowding_unwind.py \
            utbreakout/rspt_v3.py \
            utbreakout/strategy_allocator.py \
            utbreakout/relative_strength_pullback.py

      - name: Test new strategy suite
        run: python -m pytest -q tests/test_strategy_suite_v3.py
      - name: Test QH pure module
        run: python -m pytest -q tests/test_qh_flow.py
      - name: Test QH runtime integration
        run: python -m pytest -q tests/test_qh_flow_integration.py
      - name: Test RSPT integration
        run: python -m pytest -q tests/test_relative_strength_pullback.py
      - name: Test RSPT v2 compatibility
        run: python -m pytest -q tests/test_rspt_v2.py

      - name: Run full regression suite
        run: |
          set +e
          python -m pytest -q -x > /tmp/pytest-full.log 2>&1
          status=$?
          cat /tmp/pytest-full.log
          exit $status

      - name: Upload full regression failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-suite-v3-pytest-failure
          path: /tmp/pytest-full.log
          if-no-files-found: error
          retention-days: 1

      - name: Validate diff
        run: git diff --check

      - name: Commit validated implementation
        run: |
          rm -f .agent/apply_strategy_suite_v3.part00
          rm -f .agent/apply_strategy_suite_v3_part*.py
          rm -f .github/workflows/apply-strategy-suite-v3.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add QH v2 RSPT v3 crowding and adaptive allocation'
          git push origin HEAD:agent/strategy-suite-v3
