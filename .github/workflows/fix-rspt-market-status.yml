name: Fix RSPT market status label

on:
  push:
    branches:
      - fix-rspt-market-status-label

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-rspt-market-status-label
          fetch-depth: 0
      - name: Correct status fallback and duplicate label
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('emas.py')
          text = path.read_text(encoding='utf-8')
          old = """        execution = str(rsp_cfg.get('entry_execution', 'market') or 'next_open')
        execution_label = {
            'next_open': '다음 봉 시가',
                  'market': '완성봉 확인 직후 시장가',
            'market': '시장가',
            'close': '현재 봉 종가',
        }.get(execution, execution)
"""
          new = """        execution = str(rsp_cfg.get('entry_execution', 'market') or 'market')
        execution_label = {
            'next_open': '다음 봉 시가',
            'market': '완성봉 확인 직후 시장가',
            'close': '현재 봉 종가',
        }.get(execution, execution)
"""
          if text.count(old) != 1:
              raise SystemExit(f'expected one status block, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check
      - name: Install and test
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest
          python -m py_compile emas.py
          python -m pytest -q tests/test_rspt_closed_candle_market_entry.py tests/test_rspt_status_traffic_lights.py
          python -m pytest -q
      - name: Commit correction
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emas.py
          git commit -m "fix: correct RSPT market execution status"
          git push origin HEAD:fix-rspt-market-status-label
