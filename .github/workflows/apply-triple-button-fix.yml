name: Apply Triple button callback fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .agent/apply_triple_button_fix.py
      - .github/workflows/apply-triple-button-fix.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/fix-triple-button-callback'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-triple-button-callback
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Apply callback fix
        run: python .agent/apply_triple_button_fix.py

      - name: Validate callback routing
        run: |
          python -m py_compile emas.py
          python -m pytest -q tests/test_qh_flow_integration.py
          python -m pytest -q
          git diff --check

      - name: Commit validated implementation
        run: |
          rm -f .agent/apply_triple_button_fix.py
          rm -f .github/workflows/apply-triple-button-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: register QH and Triple Telegram callbacks'
          git push origin HEAD:agent/fix-triple-button-callback
