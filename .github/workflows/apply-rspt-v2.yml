name: Apply validated RSPT-v2 patch

on:
  push:
    branches:
      - agent/rspt-v2-dual-agreement
    paths:
      - .agent/rspt-v2.patch.gz.b64.*
      - .github/workflows/apply-rspt-v2.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Reconstruct and apply patch
        shell: bash
        run: |
          set -euo pipefail
          cat .agent/rspt-v2.patch.gz.b64.* | base64 --decode | gzip --decompress > /tmp/rspt-v2.patch
          git apply --check /tmp/rspt-v2.patch
          git apply /tmp/rspt-v2.patch
          git diff --check

      - name: Validate strategy changes
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            emas.py \
            scripts/utbreakout_backtest.py \
            utbreakout/relative_strength_pullback.py \
            utbreakout/rspt_v2.py
          python -m pytest -q \
            tests/test_rspt_v2.py \
            tests/test_relative_strength_pullback.py \
            tests/test_utbreakout_backtest.py \
            tests/test_utbreakout_helpers.py

      - name: Commit validated implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .agent
          rm -f .github/workflows/apply-rspt-v2.yml
          git add -A
          git diff --cached --check
          git config user.name "openai-agent[bot]"
          git config user.email "openai-agent[bot]@users.noreply.github.com"
          git commit -m "feat: add independent RSPT v2 and dual agreement routing"
          git push origin HEAD
