name: Apply verified RSPT traffic-light status

on:
  push:
    branches:
      - rspt-status-inspect
    paths:
      - .github/workflows/apply-rspt-traffic-status.yml

permissions:
  contents: write

concurrency:
  group: apply-rspt-traffic-status-to-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: repo

      - name: Checkout verified patch assets
        uses: actions/checkout@v4
        with:
          ref: rspt-status-inspect
          path: patch-assets

      - name: Reconstruct and apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d patch-assets/.github/patches/apply_rspt_traffic_status.py.gz.b64 \
            | gzip -dc > /tmp/apply_rspt_traffic_status.py
          echo "c3cfb3a67b8b7f06bc4d9ef7c3a0796d86813daa63fc97f0940e22101835216d  /tmp/apply_rspt_traffic_status.py" \
            | sha256sum -c -
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply_rspt_traffic_status.py')
          text = path.read_text(encoding='utf-8')
          old = 'return "\\n".join(lines)'
          new = 'return "\\\\n".join(lines)'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one newline-escape target, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python /tmp/apply_rspt_traffic_status.py

      - name: Install test dependencies
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile and run full test suite
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m compileall -q emas.py tests/test_rspt_status_traffic_lights.py
          python -m pytest -q tests/test_rspt_status_traffic_lights.py
          python -m pytest -q
          git diff --check

      - name: Commit directly to main
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emas.py tests/test_rspt_status_traffic_lights.py
          git diff --cached --check
          git commit -m "feat: add traffic-light RSPT status"
          git push origin HEAD:main
