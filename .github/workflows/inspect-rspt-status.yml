name: Inspect RSPT status formatter

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rspt-status-inspect
      - name: Print exact RSPT status formatter context
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          lines = Path('emas.py').read_text(encoding='utf-8').splitlines()
          needle = 'RelativeStrengthPullbackTrend status'
          matches = [i for i, line in enumerate(lines) if needle in line]
          print(f'MATCHES={matches}')
          if not matches:
              raise SystemExit('RSPT status title not found')
          i = matches[0]
          lo = max(0, i - 100)
          hi = min(len(lines), i + 170)
          for number in range(lo, hi):
              print(f'{number + 1:06d}: {lines[number]}')
          PY
