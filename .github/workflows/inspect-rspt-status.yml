name: Validate RSPT traffic-light status

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: repo

      - name: Checkout patch assets
        uses: actions/checkout@v4
        with:
          ref: rspt-status-inspect
          path: patch-assets

      - name: Reconstruct and apply patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d patch-assets/.github/patches/apply_rspt_traffic_status.py.gz.b64 \
            | gzip -dc > /tmp/apply_rspt_traffic_status.py
          echo "c3cfb3a67b8b7f06bc4d9ef7c3a0796d86813daa63fc97f0940e22101835216d  /tmp/apply_rspt_traffic_status.py" \
            | sha256sum -c -
          python /tmp/apply_rspt_traffic_status.py

      - name: Install test dependencies
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile and test
        id: validate
        shell: bash
        working-directory: repo
        run: |
          set +e
          {
            echo '=== COMPILE ==='
            python -m compileall -q emas.py tests/test_rspt_status_traffic_lights.py
            compile_status=$?
            echo "compile_status=$compile_status"
            echo '=== TARGETED TESTS ==='
            python -m pytest -q tests/test_rspt_status_traffic_lights.py
            targeted_status=$?
            echo "targeted_status=$targeted_status"
            echo '=== FULL TESTS ==='
            python -m pytest -q
            full_status=$?
            echo "full_status=$full_status"
            echo '=== DIFF CHECK ==='
            git diff --check
            diff_status=$?
            echo "diff_status=$diff_status"
          } > ../rspt-validation.log 2>&1
          cat ../rspt-validation.log
          if [ "$compile_status" -ne 0 ] || [ "$targeted_status" -ne 0 ] || [ "$full_status" -ne 0 ] || [ "$diff_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rspt-validation-log
          path: rspt-validation.log
          if-no-files-found: error
          retention-days: 1
