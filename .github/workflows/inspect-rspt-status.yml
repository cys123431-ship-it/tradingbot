name: Validate RSPT traffic-light status

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: repo

      - name: Checkout patch assets
        uses: actions/checkout@v4
        with:
          ref: rspt-status-inspect
          path: patch-assets

      - name: Reconstruct and apply patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d patch-assets/.github/patches/apply_rspt_traffic_status.py.gz.b64 \
            | gzip -dc > /tmp/apply_rspt_traffic_status.py
          echo "c3cfb3a67b8b7f06bc4d9ef7c3a0796d86813daa63fc97f0940e22101835216d  /tmp/apply_rspt_traffic_status.py" \
            | sha256sum -c -
          python /tmp/apply_rspt_traffic_status.py

      - name: Install test dependencies
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile and test
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m compileall -q emas.py tests/test_rspt_status_traffic_lights.py
          python -m pytest -q tests/test_rspt_status_traffic_lights.py
          python -m pytest -q
          git diff --check
