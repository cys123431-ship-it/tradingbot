name: Inspect RSPT status formatter

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rspt-status-inspect
      - name: Extract exact RSPT status formatter context
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          lines = Path('emas.py').read_text(encoding='utf-8').splitlines()
          needle = 'RelativeStrengthPullbackTrend status'
          matches = [i for i, line in enumerate(lines) if needle in line]
          if not matches:
              raise SystemExit('RSPT status title not found')
          i = matches[0]
          lo = max(0, i - 140)
          hi = min(len(lines), i + 240)
          out = [f'MATCH_LINE={i + 1}']
          out.extend(f'{number + 1:06d}: {lines[number]}' for number in range(lo, hi))
          Path('rspt-status-context.txt').write_text('\n'.join(out) + '\n', encoding='utf-8')
          PY
      - name: Upload formatter context
        uses: actions/upload-artifact@v4
        with:
          name: rspt-status-context
          path: rspt-status-context.txt
          if-no-files-found: error
          retention-days: 1
