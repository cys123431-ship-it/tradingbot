name: Apply automatic trading controls

on:
  pull_request:
    branches:
      - main
    paths:
      - .agent/apply_daily_limit_scan_scope.py
      - .github/workflows/inspect-daily-limit-scan-scope.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/daily-limit-scan-scope'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/daily-limit-scan-scope
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Validate and apply implementation
        run: |
          python -m py_compile .agent/apply_daily_limit_scan_scope.py
          python .agent/apply_daily_limit_scan_scope.py

      - name: Compile changed runtime
        run: |
          python -m py_compile \
            bot_runtime/controller_automatic_controls.py \
            bot_runtime/signal_automatic_controls.py \
            bot_runtime/configuration.py \
            bot_runtime/controller.py \
            bot_runtime/controller_telegram_setup.py \
            bot_runtime/database.py \
            bot_runtime/live_orders.py \
            bot_runtime/signal_entry.py \
            bot_runtime/signal_scanner.py \
            tests/test_automatic_trading_controls.py

      - name: Run focused automatic-control tests
        run: |
          python -m pytest -q \
            tests/test_automatic_trading_controls.py \
            tests/test_user_custom_entry.py \
            tests/test_tradifi_commodity_block.py \
            tests/test_utbreakout_effective_profile.py \
            tests/test_utbreakout_helpers.py \
            tests/test_runtime_modularization.py

      - name: Run full regression suite
        run: python -m pytest -q

      - name: Validate diff
        run: git diff --check

      - name: Commit validated implementation
        run: |
          rm -f .agent/apply_daily_limit_scan_scope.py
          rm -f .agent/inspect_daily_limit_scan_scope.py
          rm -f .agent/inspection.txt
          rm -f .github/workflows/inspect-daily-limit-scan-scope.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add automatic trading controls'
          git push origin HEAD:agent/daily-limit-scan-scope
