name: Apply closed-candle immediate RSPT entry

on:
  push:
    branches:
      - rspt-market-entry-20260712
    paths:
      - .github/workflows/apply-rspt-market-entry.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rspt-market-entry-20260712
          fetch-depth: 0

      - name: Apply RSPT closed-candle market-entry change
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          rsp = Path('utbreakout/relative_strength_pullback.py')
          text = rsp.read_text(encoding='utf-8')
          replacements = {
              'entry_execution: str = "next_open"': 'entry_execution: str = "market"',
              '"entry_execution": "next_open"': '"entry_execution": "market"',
              'cfg.get("entry_execution", "next_open")': 'cfg.get("entry_execution", "market")',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count < 1:
                  raise SystemExit(f'missing expected RSPT target: {old}')
              text = text.replace(old, new)
          if '"exclude_incomplete_live_candle": True' not in text:
              raise SystemExit('closed-candle guard is not enabled')
          rsp.write_text(text, encoding='utf-8')

          emas = Path('emas.py')
          text = emas.read_text(encoding='utf-8')
          targets = [
              ("rsp_cfg.get('entry_execution', 'next_open')", "rsp_cfg.get('entry_execution', 'market')"),
              ('rsp_cfg.get("entry_execution", "next_open")', 'rsp_cfg.get("entry_execution", "market")'),
          ]
          changed = 0
          for old, new in targets:
              count = text.count(old)
              if count:
                  text = text.replace(old, new)
                  changed += count
          if changed < 1:
              raise SystemExit('no RSPT runtime entry_execution fallback found in emas.py')
          text = text.replace("'next_open': '다음 봉 시가'", "'next_open': '다음 봉 시가',\n                  'market': '완성봉 확인 직후 시장가'")
          emas.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_rspt_closed_candle_market_entry.py')
          test_path.write_text('''from utbreakout.relative_strength_pullback import (\n    PullbackTrendDecision,\n    _closed_rows,\n    default_relative_strength_pullback_config,\n)\n\n\ndef test_rspt_defaults_to_market_entry_after_closed_candle_confirmation():\n    cfg = default_relative_strength_pullback_config()\n    assert cfg["entry_execution"] == "market"\n    assert cfg["exclude_incomplete_live_candle"] is True\n    assert PullbackTrendDecision(symbol="BTC/USDT").entry_execution == "market"\n\n\ndef test_rspt_excludes_the_live_4h_candle_before_signal_evaluation():\n    tf_ms = 4 * 60 * 60 * 1000\n    rows = [\n        {"timestamp": 0, "open": 1, "high": 1, "low": 1, "close": 1, "volume": 1},\n        {"timestamp": tf_ms, "open": 1, "high": 1, "low": 1, "close": 1, "volume": 1},\n    ]\n    closed = _closed_rows(rows, "4h", {"exclude_incomplete_live_candle": True}, now_ms=tf_ms + 1)\n    assert len(closed) == 1\n    assert closed[0]["timestamp"] == 0\n''', encoding='utf-8')
          PY
          git diff --check

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile and test
        run: |
          set -euo pipefail
          python -m py_compile emas.py utbreakout/relative_strength_pullback.py tests/test_rspt_closed_candle_market_entry.py
          python -m pytest -q tests/test_rspt_closed_candle_market_entry.py tests/test_rspt_status_traffic_lights.py tests/test_utbreakout_helpers.py
          python -m pytest -q

      - name: Commit verified change
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add emas.py utbreakout/relative_strength_pullback.py tests/test_rspt_closed_candle_market_entry.py
          git diff --cached --check
          git commit -m "feat: enter RSPT immediately after closed-candle confirmation"
          git push origin HEAD:rspt-market-entry-20260712
