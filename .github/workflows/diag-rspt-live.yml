name: Diagnose live RSPT status

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Build diagnosis report
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: aaa48c26503a2cfe5cc37f500fc41967a7e95b38
        shell: bash
        run: |
          set -euo pipefail
          run_json=''
          for attempt in $(seq 1 90); do
            run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_SHA}&per_page=20")"
            run_id="$(jq -r '[.workflow_runs[] | select(.name == "Deploy Trading Bot")][0].id // empty' <<<"$run_json")"
            status="$(jq -r '[.workflow_runs[] | select(.name == "Deploy Trading Bot")][0].status // empty' <<<"$run_json")"
            if [ -n "$run_id" ] && [ "$status" = "completed" ]; then
              break
            fi
            sleep 10
          done

          {
            echo "HEAD=$(git rev-parse HEAD)"
            echo "OLD_STRING_MATCHES"
            grep -RFn --include='*.py' 'RelativeStrengthPullbackTrend status' . || true
            echo "NEW_STRING_MATCHES"
            grep -RFn --include='*.py' '📊 RSPT 전략 상태' . || true
            echo "RSP_STATUS_CALLS"
            grep -RFn --include='*.py' 'build_relative_strength_pullback_status_text' . || true
            echo "WORKFLOW_RUNS_FOR_TARGET"
            jq -r '.workflow_runs[] | [.id,.name,.event,.status,.conclusion,.head_sha,.run_number,.html_url] | @tsv' <<<"$run_json" || true
            if [ -n "${run_id:-}" ]; then
              echo "DEPLOY_JOBS"
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" \
                --jq '.jobs[] | [.id,.name,.status,.conclusion] | @tsv' || true
            fi
          } > rspt-live-diagnosis.txt
          cat rspt-live-diagnosis.txt

          conclusion="$(jq -r '[.workflow_runs[] | select(.name == "Deploy Trading Bot")][0].conclusion // empty' <<<"$run_json")"
          if [ "$conclusion" != "success" ]; then
            echo "Deploy Trading Bot did not complete successfully: ${conclusion:-missing}" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rspt-live-diagnosis
          path: rspt-live-diagnosis.txt
          retention-days: 1
