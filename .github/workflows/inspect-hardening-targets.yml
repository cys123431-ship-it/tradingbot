name: Validate live-risk and RSPT hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: validate-live-risk-rspt-hardening
  cancel-in-progress: false

jobs:
  validate-and-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: hardening-live-risk-rspt
          fetch-depth: 0

      - name: Reconstruct and apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/patches/hardening.patch.gz.b64 | gzip -dc > /tmp/hardening.patch
          echo "20868998870a87fbfa4e119e73bf909ccf00b21384c18e703a91d97445ea543b  /tmp/hardening.patch" | sha256sum -c -
          git apply --check /tmp/hardening.patch
          git apply /tmp/hardening.patch
          git diff --check

      - name: Apply final review corrections
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('emas.py')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  """                        (\n                            f\"   {direction_reason} | 4h {side_4h} / 1d {side_1d} | \"\n                            '주문 없음 | 코드: no_ut_direction'\n                        ),\n""",
                  """                        (\n                            f\"   {direction_reason} | 4h {side_4h} / 1d {side_1d} | \"\n                            'UT 방향 확인 후 RSPT 조건 검사 | 주문 없음 | 코드: no_ut_direction'\n                        ),\n""",
              ),
              (
                  "    state = load_live_real_risk_state()\n    daily_loss = _realized_loss_from_state",
                  "    state = load_live_real_risk_state(cfg)\n    daily_loss = _realized_loss_from_state",
              ),
              (
                  "def _format_live_real_risk_history(state, *, limit=5):\n",
                  "def _format_live_real_risk_history(state, cfg=None, *, limit=5):\n",
              ),
              (
                  '    tz = ZoneInfo("Asia/Seoul")\n',
                  '    _, tz = _live_real_timezone(cfg)\n',
              ),
              (
                  'lines.extend(["", "최근 변경 기록:", *_format_live_real_risk_history(state)])',
                  'lines.extend(["", "최근 변경 기록:", *_format_live_real_risk_history(state, cfg)])',
              ),
              (
                  """        async def _set_live_real_risk_pct_from_user(requested_fraction, *, source):\n            cfg_for_risk = _live_real_risk_cfg()\n            current_fraction = _live_real_risk_fraction_from_cfg(cfg_for_risk)\n            state = load_live_real_risk_state()\n            change_cfg = dict(cfg_for_risk)\n""",
                  """        async def _set_live_real_risk_pct_from_user(requested_fraction, *, source):\n            cfg_for_risk = _live_real_risk_cfg()\n            current_fraction = _live_real_risk_fraction_from_cfg(cfg_for_risk)\n            try:\n                state = load_live_real_risk_state(cfg_for_risk)\n            except LiveRealRiskStateUnreadable as exc:\n                return False, (\n                    \"🔴 실거래 리스크 상태 파일을 신뢰할 수 없어 신규 거래와 리스크 변경을 차단했습니다.\\n\"\n                    \"상태 파일을 복구하거나 운영자가 확인한 뒤 다시 시도하세요.\\n\"\n                    f\"오류: {exc}\"\n                )\n            change_cfg = dict(cfg_for_risk)\n""",
              ),
              (
                  """        async def _live_real_risk_status_text(*, menu=False, notice=None):\n            cfg_for_risk = _live_real_risk_cfg()\n            state = load_live_real_risk_state()\n            limits, equity_source = await _live_real_risk_limits(cfg_for_risk)\n""",
                  """        async def _live_real_risk_status_text(*, menu=False, notice=None):\n            cfg_for_risk = _live_real_risk_cfg()\n            try:\n                state = load_live_real_risk_state(cfg_for_risk)\n            except LiveRealRiskStateUnreadable as exc:\n                return (\n                    \"🔴 실거래 리스크 상태: 거래 차단\\n\"\n                    \"누적 손실 상태 파일을 신뢰할 수 없어 fail-closed로 신규 거래를 막았습니다.\\n\"\n                    \"상태 파일을 복구하거나 운영자가 확인해야 합니다.\\n\"\n                    f\"오류: {exc}\"\n                )\n            limits, equity_source = await _live_real_risk_limits(cfg_for_risk)\n""",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one correction target, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          git diff --check

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile changed Python files
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            emas.py \
            scripts/live_real_trade.py \
            scripts/launch_emas.py \
            trading_safety/binance_algo_gateway.py \
            tests/test_live_real_trade_cli.py \
            tests/test_live_real_small_cap.py \
            tests/test_binance_algo_gateway.py \
            tests/test_utbreakout_helpers.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_official_launcher_contract.py

      - name: Run targeted safety tests
        id: targeted
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q \
            tests/test_live_real_trade_cli.py \
            tests/test_live_real_small_cap.py \
            tests/test_binance_algo_gateway.py \
            tests/test_utbreakout_helpers.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_official_launcher_contract.py \
            2>&1 | tee targeted-tests.log

      - name: Upload targeted diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-targeted-tests
          path: targeted-tests.log
          if-no-files-found: error
          retention-days: 1

      - name: Stop on targeted failure
        if: steps.targeted.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Run full test suite
        id: full
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee full-tests.log

      - name: Upload full diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardening-full-tests
          path: full-tests.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Stop on full-suite failure
        if: steps.full.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Commit verified production changes to work branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md \
            emas.py \
            scripts/live_real_trade.py \
            scripts/launch_emas.py \
            trading_safety/binance_algo_gateway.py \
            tests/test_live_real_trade_cli.py \
            tests/test_live_real_small_cap.py \
            tests/test_binance_algo_gateway.py \
            tests/test_utbreakout_helpers.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_official_launcher_contract.py
          git diff --cached --check
          git commit -m "fix: harden live risk and shared UT direction"
          git push origin HEAD:hardening-live-risk-rspt
