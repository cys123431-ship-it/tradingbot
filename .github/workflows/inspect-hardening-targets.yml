name: Inspect hardening targets

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Collect source snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p hardening-inspect/scripts hardening-inspect/trading_safety hardening-inspect/tests
          cp emas.py hardening-inspect/emas.py
          cp scripts/live_real_trade.py hardening-inspect/scripts/live_real_trade.py
          cp scripts/launch_emas.py hardening-inspect/scripts/launch_emas.py
          cp trading_safety/binance_algo_gateway.py hardening-inspect/trading_safety/binance_algo_gateway.py
          cp README.md hardening-inspect/README.md
          cp -R tests/. hardening-inspect/tests/
          git rev-parse HEAD > hardening-inspect/base-sha.txt

      - uses: actions/upload-artifact@v4
        with:
          name: hardening-source-snapshot
          path: hardening-inspect
          retention-days: 1
