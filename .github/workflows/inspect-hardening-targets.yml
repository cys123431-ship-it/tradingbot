name: Validate live-risk and RSPT hardening

on:
  push:
    branches:
      - hardening-live-risk-rspt

permissions:
  contents: write

concurrency:
  group: validate-live-risk-rspt-hardening
  cancel-in-progress: false

jobs:
  validate-and-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout work branch
        uses: actions/checkout@v4
        with:
          ref: hardening-live-risk-rspt
          fetch-depth: 0

      - name: Apply reviewed hardening changes
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/patches/hardening.patch.gz.b64 | gzip -dc > /tmp/hardening.patch
          echo "20868998870a87fbfa4e119e73bf909ccf00b21384c18e703a91d97445ea543b  /tmp/hardening.patch" | sha256sum -c -
          git apply --check /tmp/hardening.patch
          git apply /tmp/hardening.patch
          python .github/patches/final_corrections.py
          git diff --check

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Compile changed Python files
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            emas.py \
            scripts/live_real_trade.py \
            scripts/launch_emas.py \
            trading_safety/binance_algo_gateway.py

      - name: Run targeted safety tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            tests/test_live_real_trade_cli.py \
            tests/test_live_real_small_cap.py \
            tests/test_binance_algo_gateway.py \
            tests/test_utbreakout_helpers.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_official_launcher_contract.py

      - name: Run full test suite
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q

      - name: Commit verified production changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            README.md \
            emas.py \
            scripts/live_real_trade.py \
            scripts/launch_emas.py \
            trading_safety/binance_algo_gateway.py \
            tests/test_live_real_trade_cli.py \
            tests/test_live_real_small_cap.py \
            tests/test_binance_algo_gateway.py \
            tests/test_utbreakout_helpers.py \
            tests/test_rspt_status_traffic_lights.py \
            tests/test_official_launcher_contract.py
          git diff --cached --check
          git commit -m "fix: harden live risk and shared UT direction"
          git push origin HEAD:hardening-live-risk-rspt
