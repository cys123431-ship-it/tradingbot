name: Apply standalone RSPT shared UT direction

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-rspt-shared-ut-direction.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-rspt-shared-ut-direction
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Reconstruct verified patch
        shell: bash
        run: |
          set -euo pipefail
          tr -d '\n\r ' < .github/patches/rspt-shared-ut.patch.gz.b64 \
            | base64 -d > /tmp/rspt-shared-ut.patch.gz
          gzip -dc /tmp/rspt-shared-ut.patch.gz > /tmp/rspt-shared-ut.patch
          echo "65056d51dd43414cbb0e608fe928bf9e39d1c56897a43c5d25e88f0c3b40dcd0  /tmp/rspt-shared-ut.patch" \
            | sha256sum -c -

      - name: Apply patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/rspt-shared-ut.patch
          git apply /tmp/rspt-shared-ut.patch
          git diff --check

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile and test
        shell: bash
        run: |
          set -euo pipefail
          python -m compileall -q emas.py utbreakout tests
          python -m pytest -q

      - name: Commit directly to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-rspt-shared-ut-direction.yml
          rm -f .github/patches/rspt-shared-ut.patch.gz.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: unify standalone RSPT with shared UT direction"
          git push origin HEAD:main
