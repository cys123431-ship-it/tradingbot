name: Apply SKHY TradFi allowance

on:
  pull_request:
    branches:
      - main
    paths:
      - .agent/apply_skhy_tradifi_allow.py
      - .github/workflows/apply-skhy-tradifi-allow.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/allow-skhy-tradifi'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/allow-skhy-tradifi
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Apply SKHY allowance
        run: python .agent/apply_skhy_tradifi_allow.py

      - name: Validate
        run: |
          python -m py_compile emas.py utbreakout/coinselector.py
          python -m pytest -q tests/test_utbreakout_restricted_symbols.py tests/test_coinselector.py
          python -m pytest -q
          git diff --check

      - name: Commit validated implementation
        run: |
          rm -f .agent/apply_skhy_tradifi_allow.py
          rm -f .github/workflows/apply-skhy-tradifi-allow.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: explicitly allow SKHY TradFi perpetual'
          git push origin HEAD:agent/allow-skhy-tradifi
