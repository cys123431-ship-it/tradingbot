name: Diagnose hardening runs

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Query hardening branch runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=hardening-live-risk-rspt&per_page=30" \
            --jq '.workflow_runs[] | [.id,.name,.event,.status,.conclusion,.head_sha,.run_number,.html_url] | @tsv' \
            > hardening-runs.txt
          cat hardening-runs.txt
      - uses: actions/upload-artifact@v4
        with:
          name: hardening-runs
          path: hardening-runs.txt
          retention-days: 1
