name: Validate daily limit display hotfix

on:
  pull_request:
    branches:
      - main
    paths:
      - bot_runtime/configuration.py
      - bot_runtime/controller_telegram_setup.py
      - bot_runtime/runtime_profile.py
      - tests/test_daily_limit_display_hotfix.py
      - .github/workflows/validate-daily-limit-display-hotfix.yml

permissions:
  contents: write

jobs:
  test-and-finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/fix-daily-limit-display'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-daily-limit-display
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Compile changed runtime
        run: |
          python -m py_compile \
            bot_runtime/configuration.py \
            bot_runtime/controller_telegram_setup.py \
            bot_runtime/runtime_profile.py \
            tests/test_daily_limit_display_hotfix.py

      - name: Run focused tests
        run: |
          python -m pytest -q \
            tests/test_daily_limit_display_hotfix.py \
            tests/test_automatic_trading_controls.py \
            tests/test_utbreakout_effective_profile.py \
            tests/test_runtime_modularization.py

      - name: Run full regression suite
        run: python -m pytest -q

      - name: Validate diff
        run: git diff --check

      - name: Remove temporary workflow
        run: |
          rm -f .github/workflows/validate-daily-limit-display-hotfix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test: validate extended automatic daily limit'
          git push origin HEAD:agent/fix-daily-limit-display
