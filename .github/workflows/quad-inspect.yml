name: Quad crowding integration

on:
  pull_request:
    branches:
      - main
    paths:
      - .agent/apply_quad_crowding.py
      - .github/workflows/quad-inspect.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/quad-crowding'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/quad-crowding
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Validate patch
        run: python -m py_compile .agent/apply_quad_crowding.py

      - name: Apply Quad integration
        run: python .agent/apply_quad_crowding.py

      - name: Compile changed runtime
        run: |
          python -m py_compile \
            emas.py \
            utbreakout/qh_flow.py \
            tests/test_qh_flow_integration.py

      - name: Run focused strategy tests
        run: |
          python -m pytest -q \
            tests/test_qh_flow_integration.py \
            tests/test_strategy_suite_v3.py \
            tests/test_qh_flow.py \
            tests/test_relative_strength_pullback.py \
            tests/test_rspt_v2.py

      - name: Run full regression suite
        run: python -m pytest -q

      - name: Normalize and validate diff
        run: |
          python - <<'PY'
          from pathlib import Path

          for name in (
              'README.md',
              'emas.py',
              'tests/test_qh_flow_integration.py',
              'utbreakout/qh_flow.py',
          ):
              path = Path(name)
              lines = path.read_text(encoding='utf-8').splitlines()
              path.write_text('\n'.join(line.rstrip() for line in lines).rstrip() + '\n', encoding='utf-8')
          PY
          git diff --check

      - name: Commit validated implementation
        run: |
          rm -f .agent/apply_quad_crowding.py
          rm -f .github/workflows/quad-inspect.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add Crowding Unwind to Quad strategy'
          git push origin HEAD:agent/quad-crowding
