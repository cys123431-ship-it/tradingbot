name: Apply critical pause safety fix to main

on:
  push:
    branches:
      - chatgpt-critical-pause-stage
    paths:
      - .github/workflows/apply-critical-pause-fix.yml

permissions:
  contents: write

concurrency:
  group: apply-critical-pause-safety-fix-to-main
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging assets
        uses: actions/checkout@v4
        with:
          ref: chatgpt-critical-pause-stage
          path: stage-assets

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: repo

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat stage-assets/.github/patches/critical-pause-fix-*.b64 \
            | base64 -d > /tmp/critical-pause-fix.patch.gz
          gzip -dc /tmp/critical-pause-fix.patch.gz \
            > /tmp/critical-pause-fix.patch
          echo "be4fa51e2ba2a2216a3a5fbf5c89ee7d6507336ab26df64828f8fcf7984b24cb  /tmp/critical-pause-fix.patch" \
            | sha256sum -c -

      - name: Apply patch to main worktree
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "a93e09560bf6b014c38c10d15defccf573447fcb"
          git apply --check /tmp/critical-pause-fix.patch
          git apply /tmp/critical-pause-fix.patch
          git diff --check

      - name: Install test dependencies
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Verify patched source
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          python -m compileall -q emas.py trading_safety tests
          python -m pytest -q

      - name: Commit patch directly to main
        shell: bash
        working-directory: repo
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: harden critical pause entry handling"
          git push origin HEAD:main
