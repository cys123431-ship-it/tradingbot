name: Diagnose RSPT status correction runs

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Query branch workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=fix-rspt-market-status-label&per_page=20" \
            --jq '.workflow_runs[] | [.id,.name,.event,.status,.conclusion,.head_sha,.run_number,.html_url] | @tsv' \
            > rspt-status-runs.txt
          cat rspt-status-runs.txt
      - uses: actions/upload-artifact@v4
        with:
          name: rspt-status-runs
          path: rspt-status-runs.txt
          retention-days: 1
