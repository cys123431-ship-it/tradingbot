name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure 서버에 배포하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== 배포 시작 ==="
            cd /home/azureuser/tradingbot

            echo "=== 최신 코드 가져오기 ==="
            git pull origin main --no-rebase

            echo "=== Python 가상환경 준비 ==="
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi

            ./venv/bin/python -m pip install --upgrade pip
            ./venv/bin/python -m pip install -r requirements.txt

            echo "=== 기존 봇 종료 중 ==="
            pkill -f "python.*emas.py" || true
            sleep 2

            echo "=== 봇 재시작 ==="
            nohup ./venv/bin/python emas.py > emas.log 2>&1 < /dev/null &
            sleep 3

            echo "=== 프로세스 확인 ==="
            pgrep -af "python.*emas.py" || (echo "프로세스 시작 실패"; tail -n 50 emas.log; exit 1)

            echo "=== 배포 완료 ==="
            echo "실행 중인 emas.py 프로세스:"
            pgrep -af "python.*emas.py" || echo "프로세스 없음"
            echo "로그 마지막 10줄:"
            tail -n 10 emas.log || echo "로그 파일 없음"
