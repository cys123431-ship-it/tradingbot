name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure 서버에 배포하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/home/azureuser/tradingbot
            PID_FILE=/home/azureuser/emas.pid
            LOG_FILE=/home/azureuser/emas.log
            CONFIG_BACKUP=/tmp/tradingbot-config.json

            echo "=== 배포 시작 ==="
            cd "$APP_DIR"

            echo "=== 런타임 설정 백업 ==="
            if [ -f config.json ]; then
              cp config.json "$CONFIG_BACKUP"
              echo "config.json 백업 완료"
            else
              rm -f "$CONFIG_BACKUP"
              echo "config.json 없음 (백업 생략)"
            fi

            echo "=== 최신 코드 동기화 ==="
            git fetch origin main
            if git show-ref --verify --quiet refs/heads/main; then
              git checkout -f main
            else
              git checkout -f -B main origin/main
            fi
            git reset --hard origin/main
            git clean -fd

            echo "=== 런타임 설정 복원 ==="
            if [ -f "$CONFIG_BACKUP" ]; then
              cp "$CONFIG_BACKUP" config.json
              echo "config.json 복원 완료"
            else
              echo "복원할 config 백업 없음"
            fi

            echo "=== Python 가상환경 준비 ==="
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi

            ./venv/bin/python -m pip install --upgrade pip
            ./venv/bin/python -m pip install -r requirements.txt

            echo "=== 기존 봇 종료 중 ==="
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE" || true)
              if [ -n "$OLD_PID" ] && kill -0 "$OLD_PID" 2>/dev/null; then
                kill "$OLD_PID"
              fi
              rm -f "$PID_FILE"
              sleep 2
            fi

            echo "=== 봇 재시작 ==="
            : > "$LOG_FILE"
            nohup "$APP_DIR/venv/bin/python" "$APP_DIR/emas.py" > "$LOG_FILE" 2>&1 < /dev/null &
            NEW_PID=$!
            echo "$NEW_PID" > "$PID_FILE"
            sleep 3

            echo "=== 프로세스 확인 ==="
            if ! kill -0 "$NEW_PID" 2>/dev/null; then
              echo "프로세스 시작 실패"
              tail -n 50 "$LOG_FILE"
              exit 1
            fi

            echo "=== 배포 완료 ==="
            echo "실행 중인 emas.py 프로세스:"
            ps -p "$NEW_PID" -o pid=,cmd= || echo "프로세스 없음"
            echo "로그 마지막 10줄:"
            tail -n 10 "$LOG_FILE" || echo "로그 파일 없음"
