name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 Azure 서버 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY_BASE64 }}
          key_format: base64   # ← 이 줄이 중요!
          script: |
            set -e
            
            echo "=== 배포 시작 ==="
            cd /home/azureuser
            
            echo "=== Git Pull ==="
            git pull origin main --no-rebase
            
            echo "=== 기존 프로세스 종료 ==="
            pkill -f emas.py || true
            
            echo "=== 봇 재시작 ==="
            nohup python3 emas.py > emas.log 2>&1 &
            
            echo "=== 배포 완료 ==="
            ps aux | grep emas.py