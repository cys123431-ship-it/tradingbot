name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Azure 서버에 배포하기
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script_stop: false
          script: |
            echo "=== 배포 시작 ==="
            cd /home/azureuser/tradingbot
            
            echo "=== 최신 코드 가져오기 ==="
            git pull origin main --no-rebase
            
            echo "=== 기존 봇 종료 중 ==="
            pkill -f emas.py || true
            sleep 4   # 종료 대기 시간 증가
            
            echo "=== 봇 재시작 ==="
            nohup python3 emas.py > emas.log 2>&1 &
            disown -h   # 백그라운드 완전 분리
            
            echo "=== 배포 완료! ==="
            echo "실행 중인 emas.py:"
            ps aux | grep emas.py || echo "프로세스 없음"
            echo "로그 마지막 10줄:"
            tail -n 10 emas.log