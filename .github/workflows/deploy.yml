name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Static smoke tests
        run: |
          set -euo pipefail
          python -m py_compile emas.py scripts/utbreakout_backtest.py scripts/utbreakout_research_report.py
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest -q

      - name: Deploy to Azure server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            APP_DIR=/home/azureuser/tradingbot
            PID_FILE=/home/azureuser/emas.pid
            LOG_FILE=/home/azureuser/emas.log
            STATE_DIR=/home/azureuser/tradingbot/runtime
            CONFIG_BACKUP=/tmp/tradingbot-config.json
            BOT_CTL="$APP_DIR/scripts/bot_ctl.sh"

            echo "=== Deploy start ==="
            cd "$APP_DIR"

            echo "=== Back up config ==="
            if [ -f config.json ]; then
              cp config.json "$CONFIG_BACKUP"
              echo "config.json backed up"
            else
              rm -f "$CONFIG_BACKUP"
              echo "config.json not found; backup skipped"
            fi

            echo "=== Sync latest code ==="
            git fetch origin main
            if git show-ref --verify --quiet refs/heads/main; then
              git checkout -f main
            else
              git checkout -f -B main origin/main
            fi
            git reset --hard origin/main
            git clean -fd -e venv/ -e runtime/

            echo "=== Restore config ==="
            if [ -f "$CONFIG_BACKUP" ]; then
              cp "$CONFIG_BACKUP" config.json
              echo "config.json restored"
            else
              echo "no config backup to restore"
            fi

            echo "=== Prepare Python environment ==="
            PY_BOOTSTRAP=""
            for CANDIDATE in python3.12 python3 python; do
              if command -v "$CANDIDATE" >/dev/null 2>&1; then
                PY_BOOTSTRAP="$CANDIDATE"
                break
              fi
            done
            if [ -z "$PY_BOOTSTRAP" ]; then
              echo "No system Python found to create venv"
              exit 127
            fi
            if [ ! -x venv/bin/python ]; then
              rm -rf venv
              "$PY_BOOTSTRAP" -m venv venv
            fi

            ./venv/bin/python -m pip install --upgrade pip
            ./venv/bin/python -m pip install -r requirements.txt
            ./venv/bin/python -m py_compile emas.py scripts/utbreakout_backtest.py scripts/utbreakout_research_report.py
            chmod +x "$BOT_CTL"

            echo "=== Stop previous bot ==="
            PID_FILE="$PID_FILE" LOG_FILE="$LOG_FILE" "$BOT_CTL" stop

            echo "=== Start bot ==="
            START_OK=0
            for ATTEMPT in 1 2 3; do
              echo "start attempt #$ATTEMPT"
              if PID_FILE="$PID_FILE" LOG_FILE="$LOG_FILE" STATE_DIR="$STATE_DIR" TRUNCATE_LOG=1 BOT_LAUNCH_REASON=deploy_start "$BOT_CTL" start; then
                sleep 5
                if PID_FILE="$PID_FILE" LOG_FILE="$LOG_FILE" STATE_DIR="$STATE_DIR" "$BOT_CTL" status; then
                  START_OK=1
                  break
                fi
              fi
              echo "start verification failed; recent log:"
              tail -n 50 "$LOG_FILE" || true
              PID_FILE="$PID_FILE" LOG_FILE="$LOG_FILE" STATE_DIR="$STATE_DIR" "$BOT_CTL" stop || true
              sleep 3
            done

            if [ "$START_OK" -ne 1 ]; then
              echo "bot restart failed"
              tail -n 80 "$LOG_FILE" || true
              exit 1
            fi

            echo "=== Register reboot/health cron ==="
            (
              crontab -l 2>/dev/null | grep -vF "$BOT_CTL" || true
              printf '%s\n' "@reboot bash -lc 'sleep 30 && cd \"$APP_DIR\" && PID_FILE=\"$PID_FILE\" LOG_FILE=\"$LOG_FILE\" STATE_DIR=\"$STATE_DIR\" BOT_LAUNCH_REASON=reboot_start \"$BOT_CTL\" start'"
              printf '%s\n' "*/5 * * * * bash -lc 'cd \"$APP_DIR\" && PID_FILE=\"$PID_FILE\" LOG_FILE=\"$LOG_FILE\" STATE_DIR=\"$STATE_DIR\" \"$BOT_CTL\" ensure'"
            ) | crontab -

            echo "=== Final process check ==="
            if ! PID_FILE="$PID_FILE" LOG_FILE="$LOG_FILE" STATE_DIR="$STATE_DIR" "$BOT_CTL" status; then
              echo "process check failed"
              tail -n 50 "$LOG_FILE"
              exit 1
            fi

            echo "=== Deploy complete ==="
            echo "running emas.py process:"
            PID_FILE="$PID_FILE" LOG_FILE="$LOG_FILE" STATE_DIR="$STATE_DIR" "$BOT_CTL" status || echo "no process"
            echo "last 10 log lines:"
            tail -n 10 "$LOG_FILE" || echo "log file missing"
