name: Deploy Trading Bot

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 Azure 서버에 접속해서 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            set -e  # 에러 발생 시 바로 중단
            
            echo "=== 현재 위치 확인 ==="
            pwd
            ls -la
            
            echo "=== Git Pull 시작 ==="
            git pull origin main --no-rebase
            
            echo "=== 기존 emas.py 프로세스 종료 ==="
            pkill -f emas.py || true
            
            echo "=== 봇 재시작 ==="
            nohup python3 emas.py > emas.log 2>&1 &
            
            echo "=== 배포 완료 ==="
            sleep 2
            ps aux | grep -E 'emas.py|PID'