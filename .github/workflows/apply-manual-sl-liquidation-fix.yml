name: Apply manual SL liquidation safety fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .agent/apply_manual_sl_liquidation_fix.py
      - .github/workflows/apply-manual-sl-liquidation-fix.yml

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/fix-manual-sl-liquidation-safety'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-manual-sl-liquidation-safety
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Apply manual SL safety fix
        run: python .agent/apply_manual_sl_liquidation_fix.py

      - name: Validate focused and full suite
        run: |
          python -m py_compile \
            emas.py \
            trading_safety/liquidation_guard.py \
            trading_safety/reconciliation.py \
            trading_safety/binance_algo_gateway.py
          python -m pytest -q \
            tests/test_liquidation_guard.py \
            tests/test_liquidation_reconciliation.py \
            tests/test_liquidation_entry_guard.py \
            tests/test_binance_algo_gateway.py \
            tests/test_protection_idempotency.py \
            tests/test_protection_order_idempotency.py \
            tests/test_utbreakout_helpers.py
          python -m pytest -q
          git diff --check

      - name: Commit validated implementation
        run: |
          rm -f .agent/apply_manual_sl_liquidation_fix.py
          rm -f .github/workflows/apply-manual-sl-liquidation-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: preserve safe manual futures stop orders'
          git push origin HEAD:agent/fix-manual-sl-liquidation-safety
