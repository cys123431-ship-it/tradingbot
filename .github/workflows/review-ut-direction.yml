name: Review UT direction logic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Extract focused direction internals
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          from pathlib import Path

          path = Path('emas.py')
          text = path.read_text(encoding='utf-8')
          lines = text.splitlines()
          tree = ast.parse(text)
          defs = {}
          for node in ast.walk(tree):
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                  defs.setdefault(node.name, []).append((node.lineno, getattr(node, 'end_lineno', node.lineno)))

          selected = [
              '_calculate_utbot_signal',
              '_get_utbot_filtered_breakout_config',
              '_dual_alpha_direction_strategy_params',
              '_shared_ut_direction_filter',
              '_extract_relative_strength_pullback_ut_direction',
              '_resolve_relative_strength_pullback_ut_direction',
              '_calculate_relative_strength_pullback_signal',
              '_calculate_dual_alpha_signal',
          ]
          out = []
          out.append(f'HEAD_FUNCTION_REVIEW main source lines={len(lines)}')
          for name in selected:
              for start, end in defs.get(name, []):
                  out.append(f'\n### emas.py:{start}-{end} {name}\n')
                  for number in range(start, end + 1):
                      out.append(f'{number:06d}: {lines[number - 1]}')

          target_ranges = defs.get('_calculate_utbot_filtered_breakout_signal', [])
          terms = [
              '_calculate_utbot_signal(',
              "status['fresh_signal']",
              "status['candidate_signal']",
              "status['candidate_side']",
              "status['ut_bias_side']",
              "status['accepted_side']",
              "'fresh_signal':",
              "'candidate_signal':",
              "'candidate_side':",
              "'ut_bias_side':",
              'dual_alpha_direction_filter_enabled',
              'dual_alpha_direction_filter_timeframe',
              'dual_alpha_direction_filter_htf',
              'bias_side',
              'signal_side',
              'entry_timeframe',
              'htf_timeframe',
              'return _finish(',
          ]
          out.append('\n===== _calculate_utbot_filtered_breakout_signal focused contexts =====')
          emitted = set()
          for start, end in target_ranges:
              out.append(f'FUNCTION_RANGE={start}-{end}')
              for idx in range(start - 1, end):
                  line = lines[idx]
                  if not any(term in line for term in terms):
                      continue
                  lo = max(start - 1, idx - 14)
                  hi = min(end, idx + 20)
                  key = (lo, hi)
                  if key in emitted:
                      continue
                  emitted.add(key)
                  out.append(f'\n--- emas.py:{lo + 1}-{hi} ---')
                  for number in range(lo, hi):
                      out.append(f'{number + 1:06d}: {lines[number]}')

          rsp_path = Path('utbreakout/relative_strength_pullback.py')
          rsp_text = rsp_path.read_text(encoding='utf-8')
          rsp_lines = rsp_text.splitlines()
          rsp_tree = ast.parse(rsp_text)
          for node in ast.walk(rsp_tree):
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)) and node.name in {
                  'default_relative_strength_pullback_config', '_evaluate_symbol', 'evaluate_relative_strength_pullback_trend'
              }:
                  start = node.lineno
                  end = getattr(node, 'end_lineno', start)
                  out.append(f'\n### {rsp_path}:{start}-{end} {node.name}\n')
                  for number in range(start, end + 1):
                      out.append(f'{number:06d}: {rsp_lines[number - 1]}')

          Path('ut-direction-review.txt').write_text('\n'.join(out) + '\n', encoding='utf-8')
          PY

      - name: Run focused tests
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip >/dev/null
          python -m pip install -r requirements.txt pytest >/dev/null
          python -m pytest -q tests -k 'rspt or dual_alpha or utbreakout' > ut-direction-tests.txt 2>&1
          test_status=$?
          cat ut-direction-tests.txt
          echo "test_status=$test_status" >> ut-direction-tests.txt
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ut-direction-review
          path: |
            ut-direction-review.txt
            ut-direction-tests.txt
          retention-days: 1
