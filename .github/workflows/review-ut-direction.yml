name: Review UT direction logic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Extract direction logic
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          from pathlib import Path

          files = [
              Path('emas.py'),
              Path('utbreakout/relative_strength_pullback.py'),
              Path('utbreakout/engine_router.py'),
              Path('utbreakout/timeframe.py'),
          ]
          selected_names = {
              '_calculate_utbot_signal',
              '_evaluate_relative_strength_pullback_candidates',
              '_normalize_relative_strength_pullback_direction',
              '_extract_relative_strength_pullback_ut_direction',
              '_resolve_relative_strength_pullback_ut_direction',
              '_calculate_relative_strength_pullback_signal',
              '_dual_alpha_strategy_params',
              '_dual_alpha_direction_strategy_params',
              '_shared_ut_direction_filter',
              '_dual_alpha_ut_direction_filter',
              '_calculate_dual_alpha_signal',
              '_handle_utbot_primary_strategy',
              '_infer_live_utbot_direction_from_rows',
              'default_relative_strength_pullback_config',
              '_evaluate_symbol',
              'evaluate_relative_strength_pullback_trend',
              'resolve_entry_strategy',
              'evaluate_final_trade_decision',
          }
          tokens = ('direction', 'relative_strength', 'dual_alpha', 'utbreakout', 'utbot')
          out = []
          for path in files:
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              lines = text.splitlines()
              tree = ast.parse(text)
              defs = []
              for node in ast.walk(tree):
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
                      end = getattr(node, 'end_lineno', node.lineno)
                      defs.append((node.name, node.lineno, end))
              out.append(f'===== FILE {path} =====')
              out.append('--- matching definitions ---')
              for name, start, end in sorted(defs, key=lambda x: x[1]):
                  low = name.lower()
                  if name in selected_names or any(tok in low for tok in tokens):
                      out.append(f'{name}\t{start}-{end}')
              out.append('--- selected source ---')
              for name, start, end in sorted(defs, key=lambda x: x[1]):
                  if name in selected_names:
                      out.append(f'\n### {path}:{start}-{end} {name}\n')
                      for number in range(start, end + 1):
                          out.append(f'{number:06d}: {lines[number - 1]}')

          context_terms = [
              '_calculate_utbot_filtered_breakout_signal(',
              '_shared_ut_direction_filter(',
              'forced_direction=',
              'resolve_ut_direction=',
              "consumer='RSPT_STANDALONE'",
              "consumer='DUAL_ALPHA'",
              "'no_ut_direction'",
              "'accepted_side'",
          ]
          out.append('\n===== CALL-SITE CONTEXTS =====')
          path = Path('emas.py')
          lines = path.read_text(encoding='utf-8').splitlines()
          emitted = set()
          for idx, line in enumerate(lines):
              if not any(term in line for term in context_terms):
                  continue
              lo = max(0, idx - 10)
              hi = min(len(lines), idx + 16)
              key = (lo, hi)
              if key in emitted:
                  continue
              emitted.add(key)
              out.append(f'\n--- emas.py:{lo + 1}-{hi} ---')
              for number in range(lo, hi):
                  out.append(f'{number + 1:06d}: {lines[number]}')

          grep_terms = [
              'forced_direction',
              'no_ut_direction',
              'direction_source',
              'shared_ut_direction',
              'ENTRY_STRATEGY_RELATIVE_STRENGTH_PULLBACK_TREND',
              'DUAL_ALPHA',
              'dual_alpha',
          ]
          out.append('\n===== CROSS REFERENCES =====')
          for path in Path('.').rglob('*.py'):
              if '.git' in path.parts:
                  continue
              lines = path.read_text(encoding='utf-8', errors='replace').splitlines()
              for number, line in enumerate(lines, 1):
                  if any(term in line for term in grep_terms):
                      out.append(f'{path}:{number}: {line}')

          Path('ut-direction-review.txt').write_text('\n'.join(out) + '\n', encoding='utf-8')
          PY

      - name: Run focused tests
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip >/dev/null
          python -m pip install -r requirements.txt pytest >/dev/null
          python -m pytest -q tests -k 'rspt or dual_alpha or utbreakout' > ut-direction-tests.txt 2>&1
          test_status=$?
          cat ut-direction-tests.txt
          echo "test_status=$test_status" >> ut-direction-tests.txt
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ut-direction-review
          path: |
            ut-direction-review.txt
            ut-direction-tests.txt
          retention-days: 1
